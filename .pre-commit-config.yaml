repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v2.3.0
    hooks:
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
    -   id: check-yaml
    -   id: check-toml
    -   id: check-added-large-files
        args: ['--maxkb=3000']
- repo: local
  hooks:
    - id: ruff
      name: ruff
      entry: uv run ruff check --fix
      language: system
      types: [python]
    - id: ruff-format
      name: ruff-format
      entry: uv run ruff format
      language: system
      types: [python]
    - id: mypy
      name: mypy
      entry: uv run mypy autoanki/
      language: system
      pass_filenames: false
